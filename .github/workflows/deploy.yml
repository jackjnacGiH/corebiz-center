name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-corebiz:
    name: Deploy CoreBiz Unified Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Lint and build all services
        run: |
          npm run lint:corebiz
          npm run lint:jnac
          npm run build:corebiz
          npm run build:jnac

      - name: Deploy CoreBiz unified project to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_COREBIZ_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
